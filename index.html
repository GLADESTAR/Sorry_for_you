<!DOCTYPE html>
<html>
<head>
    <title>Important Question ❤️</title>

<style>
body {
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    text-align: center;
    font-family: Arial;
    margin: 0;
    overflow: hidden;
}

/* Card */
.card {
    background: white;
    padding: 40px;
    width: 400px;
    margin: 80px auto;
    border-radius: 20px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
    position: relative;
}

/* Buttons */
button {
    font-size: 18px;
    padding: 10px 20px;
    margin: 10px;
    position: absolute;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

#yes {
    left: 30%;
    top: 85%;
    background: lightgreen;
}

#no {
    left: 55%;
    top: 85%;
    background: red;
    color: white;
}

/* Inputs */
input {
    padding: 10px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid gray;
    margin: 5px;
}

/* Love Meter */
#meter {
    width: 100%;
    height: 20px;
    background: #ddd;
    border-radius: 10px;
    margin-top: 10px;
}

#fill {
    height: 100%;
    width: 0%;
    background: red;
    border-radius: 10px;
    transition: 1s;
}

/* Floating hearts */
.hearts::before {
    content: "❤️ 💖 💕 💘 💗";
    font-size: 30px;
    position: fixed;
    animation: float 10s linear infinite;
    left: 50%;
}

@keyframes float {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div class="hearts"></div>

<div class="card">

<h1>Will You Be My Girlfriend? ❤️</h1>
<p>I promise to share food... sometimes 😌</p>

<br>

<input id="name1" placeholder="Your Name" />
<br>
<input id="name2" placeholder="My Name 😌" />
<br>

<button onclick="calculateLove()" style="position:static;">Check Love 💖</button>

<h2 id="result"></h2>

<div id="meter">
    <div id="fill"></div>
</div>

<button id="yes" onclick="yesClicked()">YES</button>
<button id="no" onclick="moveButton()">NO</button>

</div>

<script>

/* LOVE CALCULATOR */
function calculateLove() {
    let name1 = document.getElementById("name1").value;
    let name2 = document.getElementById("name2").value;

    if(name1 === "" || name2 === "") {
        document.getElementById("result").innerText = "Enter both names 😡";
        return;
    }

    document.getElementById("result").innerText = "Calculating... ❤️";

    setTimeout(() => {
        document.getElementById("result").innerText = "100% LOVE ❤️";
        document.getElementById("fill").style.width = "100%";
    }, 1500);
}

/* YES BUTTON */
function yesClicked() {
    document.body.innerHTML = `
    <h1>YAYYYYY ❤️🥰</h1>
    <h2>You just made me the happiest person 😭💖</h2>
    <p>Our love is scientifically proven 💘</p>
    `;
}

/* NO BUTTON RUNS AWAY */
function moveButton() {
    let button = document.getElementById("no");

    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);

    button.style.left = x + "px";
    button.style.top = y + "px";

    button.innerHTML = "Are you sure? 😢";
}

</script>

</body>
</html>
