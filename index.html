<!DOCTYPE html>
<html>
<head>
    <title>Important Question ❤️</title>

    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            text-align: center;
            font-family: Arial;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 40px;
            width: 400px;
            margin: 100px auto;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            position: relative;
        }

        h1 {
            font-size: 40px;
        }

        button {
            font-size: 20px;
            padding: 10px 20px;
            margin: 20px;
            position: absolute;
        }

        #yes {
            left: 30%;
            top: 70%;
            background: lightgreen;
        }

        #no {
            left: 55%;
            top: 70%;
            background: red;
            color: white;
        }

        .hearts::before {
            content: "❤️ 💖 💕 💘 💗";
            font-size: 30px;
            position: fixed;
            animation: float 10s linear infinite;
            left: 50%;
        }

        @keyframes float {
            0% { transform: translateY(100vh); }
            100% { transform: translateY(-10vh); }
        }
    </style>
</head>

<body>

<div class="hearts"></div>

<div class="card">

    <h1>Will You Be My Girlfriend? ❤️</h1>
    <p>I promise to share food... sometimes 😌</p>

    <button id="yes" onclick="yesClicked()">YES</button>
    <button id="no" onclick="moveButton()">NO</button>

</div>

<script>

function yesClicked() {
    document.body.innerHTML = `
    <h1>YAYYYYY ❤️🥰</h1>
    <p>You just made me the happiest person 😭💖</p>
    `;
}

function moveButton() {
    let button = document.getElementById("no");

    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);

    button.style.left = x + "px";
    button.style.top = y + "px";

    button.innerHTML = "Are you sure? 😢";
}

</script>

</body>
</html>
