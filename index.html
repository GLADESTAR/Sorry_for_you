<!DOCTYPE html>
<html>
<head>
    <title>Important Question ❤️</title>

    <style>
        body {
            background: pink;
            text-align: center;
            font-family: Arial;
            margin-top: 100px;
        }

        h1 {
            font-size: 40px;
        }

        button {
            font-size: 20px;
            padding: 10px 20px;
            margin: 20px;
            position: absolute;
        }

        #yes {
            left: 45%;
            top: 60%;
            background: lightgreen;
        }

        #no {
            left: 55%;
            top: 60%;
            background: red;
            color: white;
        }
    </style>
</head>

<body>

    <h1>Will You Be My Girlfriend? ❤️</h1>

    <button id="yes" onclick="yesClicked()">YES</button>
    <button id="no" onclick="moveButton()">NO</button>

    <script>

        function yesClicked() {
            document.body.innerHTML = "<h1>YAYYY ❤️🥰</h1>";
        }

        function moveButton() {
            let button = document.getElementById("no");

            let x = Math.random() * window.innerWidth;
            let y = Math.random() * window.innerHeight;

            button.style.left = x + "px";
            button.style.top = y + "px";
        }

    </script>

</body>
</html>
